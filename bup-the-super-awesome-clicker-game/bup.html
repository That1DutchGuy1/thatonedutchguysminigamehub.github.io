<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bup The Super Awesome Clicker Game</title>
  <link rel="icon" type="image/x-icon" href="./bup-the-super-awesome-clicker-game.ico">
  <link rel="preload" href="bup.jpg" as="image">
  <link rel="stylesheet" href="bup.css">
</head>

<body>
<h1>BUP</h1>
<p>THE SUPER AWESOME CLICKER GAME</p>
<script src="bup.js"></script>

<audio id="bupAudio">
  <source src="bup.mp3" type="audio/mpeg">
</audio>
<audio id="milestoneAudio">
  <source src="im-the-best.wav" type="audio/mpeg">
</audio>
<audio id="toadAudio">
  <source src="hello-toad.mp3" type="audio/mpeg">
</audio>
<audio id="egaddAudio">
  <source src="egadd.mp3" type="audio/mpeg">
</audio>
<audio id="mamaLuigiAudio">
  <source src="mama-luigi.mp3" type="audio/mpeg">
</audio>
<audio id="nopeAudio">
  <source src="engineer-nope.mp3" type="audio/mpeg">
</audio>
<audio id="cricketsAudio" loop>
  <source src="crickets.wav" type="audio/mpeg">
</audio>

<button id="button" type="button">CLICK TO BUP!</button>

<div id="score">0</div>
<div id="label">YOUR BUP SCORE</div>
<div id="milestone"></div>
<div id="upgrade-msg"></div>

<!-- Upgrades panel -->
<div id="upgrades-panel">
  <div id="upgrades-label">UPGRADES</div>
  <button class="upgrade-btn" id="upgrade-toad" type="button"></button>
  <button class="upgrade-btn" id="upgrade-egadd" type="button"></button>
  <button class="upgrade-btn" id="upgrade-gamble" type="button"></button>
</div>

<button class="reset-button" type="button">RESET GAME</button>

<a href="../index.html" id="hub-btn" class="button">← HUB</a>
<a href="https://www.youtube.com/@That1DutchGuy" target="_blank">Made by YouTuber That One Dutch Guy</a>
</body>
</html>
