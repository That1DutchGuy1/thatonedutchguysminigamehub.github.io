<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick Roller 2D - Deluxe Edition</title>
    <link rel="stylesheet" href="rick-roll-2d.css">
</head>
<body>
    <div id="game-ui">
        <h1>Rick Roller 2D - Deluxe Edition</h1>
        <div id="stats-bar" style="display: none;">
            <span id="lives-display">Lives: 3</span> | 
            <span id="level-display">Level: 1</span>
        </div>
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="main-menu">
            <h2 style="color: #ffcc00;">DELUXE EDITION</h2>
            <p>Collect the CDs for extra lives!</p>
            <button id="start-btn">START GAME</button>
        </div>
    </div>

    <audio id="bgMusic" src="8-bit-never-gonna-give-you-up.mp3" loop></audio>

    <img id="rickSpriteSheet" src="Rick Astley HD transparent sprite sheet.png" crossorigin="anonymous" style="display:none;">

    <script src="rick-roll-2d.js"></script>

    <a href="../index.html" id="hub-btn">← HUB</a>
